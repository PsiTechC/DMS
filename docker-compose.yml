services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dms_app
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      POSTGRES_DB: dms
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dms_app -d dms"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: psittech/dms-backend:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 8090
      APP_ENV: production
      PUBLIC_BASE_URL: https://dms.psitech.co.in
      CORS_ORIGINS: https://dms.psitech.co.in
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: dms_app
      DB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      DB_NAME: dms
      DB_SSLMODE: disable
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
    volumes:
      - uploads:/app/uploads

  frontend:
    image: psittech/dms-frontend:latest
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:8083:80"

volumes:
  db_data:
  uploads:
