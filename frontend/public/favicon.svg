<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="55%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="15" fill="url(#g)"/>

  <!-- Lucide's qr-code glyph, scaled from its 24px grid to fit with padding.
       The finder squares are split from the data modules so the accent can sit
       on a solid shape — a thin data dot would muddy into the blue at 16px. -->
  <g transform="translate(9.5 9.5) scale(1.875)"
     fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

    <g stroke="#ffffff">
      <rect width="5" height="5" x="3" y="3" rx="1"/>
      <rect width="5" height="5" x="3" y="16" rx="1"/>
    </g>

    <!-- Amber accent on the top-right finder. -->
    <g stroke="#fbbf24">
      <rect width="5" height="5" x="16" y="3" rx="1"/>
    </g>

    <g stroke="#ffffff">
      <path d="M21 16h-3a2 2 0 0 0-2 2v3"/>
      <path d="M21 21v.01"/>
      <path d="M12 7v3a2 2 0 0 1-2 2H7"/>
      <path d="M3 12h.01"/>
      <path d="M12 3h.01"/>
      <path d="M12 16v.01"/>
      <path d="M16 12h1"/>
      <path d="M21 12v.01"/>
      <path d="M12 21v-1"/>
    </g>
  </g>
</svg>
